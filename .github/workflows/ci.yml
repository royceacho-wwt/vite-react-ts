name: App CI

on:
  push:
    # Run on all branches
    branches:
      - "*"
    # Run only if files modified are not docs
    paths-ignore:
      - "*.md"
  pull_request:
    # Run on all branches
    branches:
      - "*"
    # Run only if files modified are not docs
    paths-ignore:
      - "*.md"
  # Allow the deploy job to be triggered manually from the Actions tab
  workflow_dispatch:

# Allow only one concurrent deployment, cancelling any in-progress run
concurrency:
  group: pages
  cancel-in-progress: true

jobs:

  buildAndTest:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: 🏗 Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8

      - name: 🏗 Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 18
          cache: pnpm

      - name: 🗂️ Install dependencies
        run: pnpm i

      - name: 🔨 Build
        run: pnpm build:ci

      - name: 🧪 Test
        run: pnpm test:ci

      # Upload dist artifacts
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

      # Upload coverage artifacts
      - uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage/lcov.info

  coverage:
    name: Coverage Analysis
    needs: buildAndTest
    runs-on: ubuntu-latest
    steps:
      # Download coverage artifacts
      - uses: actions/download-artifact@v4
        with:
          name: coverage

      - name: 📈 Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: lcov.info

  deploy:
    name: Deploy
    # Deploy only for main branch (or manual trigger)
    if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
    needs: buildAndTest
    runs-on: ubuntu-latest
    # --- Permissions required by the official GitHub Pages deployment actions ---
    permissions:
      contents: read      # read the repo
      pages: write        # deploy to GitHub Pages
      id-token: write     # verify the deployment source via OIDC
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      # Download dist artifacts
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: 🔧 Configure GitHub Pages
        uses: actions/configure-pages@v4

      - name: 📦 Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/

      - name: 🚀 Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

